<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Presenta Pro Controller</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #0a0a0a;
        color: #f0f0f0;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px;
      }
      .card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        padding: 14px;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        border-radius: 14px;
        padding: 12px 14px;
        font-weight: 800;
        cursor: pointer;
      }
      .btn.primary {
        background: #10b981;
        border-color: #10b981;
        color: #04130d;
      }
      .btn.mini {
        padding: 6px 8px;
        border-radius: 12px;
        font-weight: 900;
        font-size: 12px;
      }
      .btn.danger {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.35);
      }
      .btn.subtle {
        background: rgba(255, 255, 255, 0.04);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        padding: 12px 14px;
        font-weight: 800;
      }
      textarea {
        min-height: 120px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        font-size: 12px;
        line-height: 1.4;
      }
      .muted {
        color: rgba(255, 255, 255, 0.55);
        font-weight: 700;
        font-size: 12px;
        line-height: 1.35;
      }
      .time {
        font-size: 56px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-align: center;
        margin: 6px 0;
      }
      .label {
        text-align: center;
        font-weight: 900;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.65);
        font-size: 12px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        font-size: 12px;
        font-weight: 900;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
      }
      .dot.ok {
        background: #10b981;
      }
      .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 12px 0;
      }
      .agenda {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }
      .agenda-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.18);
        cursor: pointer;
      }
      .agenda-item.selected {
        border-color: rgba(16, 185, 129, 0.55);
        background: rgba(16, 185, 129, 0.08);
      }
      .agenda-title {
        font-weight: 900;
        font-size: 13px;
      }
      .agenda-meta {
        font-weight: 900;
        font-size: 12px;
        opacity: 0.75;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        font-size: 12px;
        font-weight: 900;
      }
      .two {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr;
      }
      @media (min-width: 720px) {
        .two {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="row" style="align-items: center; justify-content: space-between">
          <div class="pill"><span class="dot" id="dot"></span><span id="status">Disconnected</span></div>
          <div class="muted">Wi-Fi default. Bluetooth-only works via Bluetooth tethering/PAN.</div>
        </div>
        <div style="height: 12px"></div>
        <div class="row">
          <div style="flex: 1 1 220px">
            <div class="muted">Pairing code (from the host app)</div>
            <input id="code" inputmode="numeric" placeholder="123456" maxlength="6" />
          </div>
          <div style="flex: 0 0 auto; align-self: end">
            <button class="btn primary" id="connect">Connect</button>
          </div>
        </div>
      </div>

      <div style="height: 12px"></div>

      <div class="card">
        <div class="row" style="justify-content: space-between; align-items: center">
          <div class="tag"><span class="dot" id="runDot"></span><span id="runState">Paused</span></div>
          <div class="muted" id="selMeta">Selected: —</div>
        </div>
        <div style="height: 10px"></div>
        <div class="label" id="segment">—</div>
        <div class="time" id="time">00:00</div>
        <div class="row" style="justify-content: center">
          <button class="btn primary" id="play">Play</button>
          <button class="btn" id="pause">Pause</button>
          <button class="btn danger" id="reset">Reset</button>
        </div>
        <div style="height: 10px"></div>
        <div class="row" style="justify-content: center">
          <button class="btn" id="prev">Prev</button>
          <button class="btn" id="apply">Apply Selected</button>
          <button class="btn" id="next">Next</button>
        </div>

        <div class="divider"></div>

        <div class="row">
          <div style="flex: 1 1 240px">
            <div class="muted">Broadcast message</div>
            <input id="broadcastMsg" placeholder="Type a message…" />
          </div>
          <div style="flex: 0 0 auto; align-self: end" class="row">
            <button class="btn subtle" id="broadcastShow">Show</button>
            <button class="btn subtle" id="broadcastHide">Hide</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="row">
          <div style="flex: 1 1 200px">
            <div class="muted">Open display (optional monitor index)</div>
            <input id="outputIndex" inputmode="numeric" placeholder="0, 1, 2 … (optional)" />
          </div>
          <div style="flex: 0 0 auto; align-self: end" class="row">
            <button class="btn subtle" id="openDisplay">Open</button>
            <button class="btn subtle" id="closeDisplay">Close</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="muted">Agenda</div>
        <div class="agenda" id="agenda"></div>

        <div class="divider"></div>

        <div class="muted">Build agenda (like desktop)</div>
        <div class="two" style="margin-top: 10px">
          <div>
            <div class="muted">Title</div>
            <input id="draftLabel" placeholder="e.g. Opening Remarks" />
          </div>
          <div>
            <div class="muted">Minutes</div>
            <input id="draftMinutes" inputmode="numeric" placeholder="5" />
          </div>
        </div>
        <div class="two" style="margin-top: 10px">
          <div>
            <div class="muted">Color</div>
            <input id="draftColor" type="color" value="#10b981" style="height: 46px; padding: 6px 10px" />
          </div>
          <div>
            <div class="muted">Description (optional)</div>
            <input id="draftDescription" placeholder="Notes…" />
          </div>
        </div>
        <div class="row" style="align-items: center; justify-content: space-between; margin-top: 10px">
          <div class="row">
            <button class="btn subtle mini" id="draftAdd">Add</button>
            <button class="btn subtle mini" id="draftClear">Clear</button>
          </div>
          <div class="row">
            <button class="btn subtle mini" id="draftLoadFromHost">Use host agenda</button>
            <button class="btn primary mini" id="draftSend">Send to host</button>
          </div>
        </div>
        <div class="agenda" id="draftAgenda" style="margin-top: 10px"></div>
        <div class="muted" id="draftStatus" style="margin-top: 8px"></div>

        <div class="divider"></div>

        <div class="muted">Replace agenda (JSON array)</div>
        <textarea id="agendaJson" placeholder='[{"id":"1","label":"Welcome","duration":300,"color":"#10b981"}]'></textarea>
        <div class="row" style="align-items: center; justify-content: space-between; margin-top: 10px">
          <button class="btn subtle" id="agendaJsonApply">Apply</button>
          <div class="muted" id="agendaJsonStatus"></div>
        </div>
      </div>
    </div>

    <script>
      const dot = document.getElementById("dot");
      const statusEl = document.getElementById("status");
      const codeEl = document.getElementById("code");
      const connectBtn = document.getElementById("connect");
      const playBtn = document.getElementById("play");
      const pauseBtn = document.getElementById("pause");
      const resetBtn = document.getElementById("reset");
      const prevBtn = document.getElementById("prev");
      const nextBtn = document.getElementById("next");
      const applyBtn = document.getElementById("apply");
      const timeEl = document.getElementById("time");
      const segmentEl = document.getElementById("segment");
      const runDot = document.getElementById("runDot");
      const runStateEl = document.getElementById("runState");
      const selMetaEl = document.getElementById("selMeta");
      const agendaEl = document.getElementById("agenda");
      const openDisplayBtn = document.getElementById("openDisplay");
      const closeDisplayBtn = document.getElementById("closeDisplay");
      const outputIndexEl = document.getElementById("outputIndex");
      const broadcastMsgEl = document.getElementById("broadcastMsg");
      const broadcastShowBtn = document.getElementById("broadcastShow");
      const broadcastHideBtn = document.getElementById("broadcastHide");
      const agendaJsonEl = document.getElementById("agendaJson");
      const agendaJsonApplyBtn = document.getElementById("agendaJsonApply");
      const agendaJsonStatusEl = document.getElementById("agendaJsonStatus");
      const draftLabelEl = document.getElementById("draftLabel");
      const draftMinutesEl = document.getElementById("draftMinutes");
      const draftColorEl = document.getElementById("draftColor");
      const draftDescriptionEl = document.getElementById("draftDescription");
      const draftAddBtn = document.getElementById("draftAdd");
      const draftClearBtn = document.getElementById("draftClear");
      const draftLoadFromHostBtn = document.getElementById("draftLoadFromHost");
      const draftSendBtn = document.getElementById("draftSend");
      const draftAgendaEl = document.getElementById("draftAgenda");
      const draftStatusEl = document.getElementById("draftStatus");

      let ws = null;
      let latestHostAgenda = [];
      let draftAgenda = [];

      function setStatus(ok, text) {
        dot.classList.toggle("ok", !!ok);
        statusEl.textContent = text;
      }

      function format(ms) {
        ms = Math.max(0, Number(ms) || 0);
        const total = Math.ceil(ms / 1000);
        const mm = String(Math.floor(total / 60)).padStart(2, "0");
        const ss = String(total % 60).padStart(2, "0");
        return mm + ":" + ss;
      }

      function formatDur(seconds) {
        seconds = Math.max(0, Number(seconds) || 0);
        const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
        const ss = String(Math.floor(seconds % 60)).padStart(2, "0");
        return mm + ":" + ss;
      }

      function render(state) {
        if (!state || !state.payload) return;
        const p = state.payload;

        timeEl.textContent = format(p.timeLeft);
        segmentEl.textContent = p.activeItem && p.activeItem.label ? p.activeItem.label : "—";

        const running = !!p.isActive;
        runDot.classList.toggle("ok", running);
        runStateEl.textContent = running ? "Running" : "Paused";

        const sel = Number(p.selectedIndex) || 0;
        const agenda = Array.isArray(p.agenda) ? p.agenda : [];
        latestHostAgenda = agenda.map(normalizeAgendaItem);
        const selectedItem = agenda[sel];
        selMetaEl.textContent = selectedItem ? `Selected: ${selectedItem.label}` : "Selected: —";

        agendaEl.innerHTML = "";
        for (let i = 0; i < agenda.length; i++) {
          const item = agenda[i] || {};
          const div = document.createElement("div");
          div.className = "agenda-item" + (i === sel ? " selected" : "");
          div.onclick = () => send({ type: "SET_SELECTED_INDEX", payload: { index: i } });

          const left = document.createElement("div");
          const title = document.createElement("div");
          title.className = "agenda-title";
          title.textContent = item.label || `Item ${i + 1}`;
          const meta = document.createElement("div");
          meta.className = "agenda-meta";
          meta.textContent = formatDur(item.duration || 0);
          left.appendChild(title);
          left.appendChild(meta);

          const right = document.createElement("div");
          right.className = "agenda-meta";
          right.textContent = i === sel ? "Selected" : "";

          div.appendChild(left);
          div.appendChild(right);
          agendaEl.appendChild(div);
        }
      }

      function normalizeAgendaItem(item) {
        const safe = item && typeof item === "object" ? item : {};
        const duration = Number(safe.duration) || 0;
        return {
          id: String(safe.id || `${Date.now()}-${Math.random()}`),
          label: String(safe.label || ""),
          duration: Math.max(0, Math.floor(duration)),
          color: String(safe.color || "#10b981"),
          description: safe.description == null ? "" : String(safe.description),
        };
      }

      function setDraftStatus(text) {
        draftStatusEl.textContent = text || "";
      }

      function renderDraft() {
        draftAgendaEl.innerHTML = "";

        for (let i = 0; i < draftAgenda.length; i++) {
          const item = draftAgenda[i];
          const div = document.createElement("div");
          div.className = "agenda-item";

          const left = document.createElement("div");
          const title = document.createElement("div");
          title.className = "agenda-title";
          title.textContent = item.label || `Item ${i + 1}`;
          const meta = document.createElement("div");
          meta.className = "agenda-meta";
          meta.textContent = formatDur(item.duration || 0);
          left.appendChild(title);
          left.appendChild(meta);

          const right = document.createElement("div");
          right.className = "row";
          right.style.gap = "6px";

          const up = document.createElement("button");
          up.className = "btn subtle mini";
          up.textContent = "↑";
          up.disabled = i === 0;
          up.onclick = () => {
            if (i === 0) return;
            const next = draftAgenda.slice();
            const tmp = next[i - 1];
            next[i - 1] = next[i];
            next[i] = tmp;
            draftAgenda = next;
            renderDraft();
          };

          const down = document.createElement("button");
          down.className = "btn subtle mini";
          down.textContent = "↓";
          down.disabled = i === draftAgenda.length - 1;
          down.onclick = () => {
            if (i === draftAgenda.length - 1) return;
            const next = draftAgenda.slice();
            const tmp = next[i + 1];
            next[i + 1] = next[i];
            next[i] = tmp;
            draftAgenda = next;
            renderDraft();
          };

          const del = document.createElement("button");
          del.className = "btn danger mini";
          del.textContent = "Remove";
          del.onclick = () => {
            draftAgenda = draftAgenda.filter((_, idx) => idx !== i);
            renderDraft();
          };

          right.appendChild(up);
          right.appendChild(down);
          right.appendChild(del);

          div.appendChild(left);
          div.appendChild(right);
          draftAgendaEl.appendChild(div);
        }
      }

      function send(msg) {
        if (!ws || ws.readyState !== 1) return;
        ws.send(JSON.stringify(msg));
      }

      function connect() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        const url = proto + "//" + location.host + "/ws";
        ws = new WebSocket(url);

        setStatus(false, "Connecting…");

        ws.onopen = () => {
          send({ type: "AUTH", code: (codeEl.value || "").trim() });
        };

        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === "AUTH_OK") {
              setStatus(true, "Connected");
              if (msg.state) render(msg.state);
              return;
            }
            if (msg.type === "AUTH_FAIL") {
              setStatus(false, "Wrong code");
              return;
            }
            if (msg.type === "STATE") {
              render(msg);
            }
            if (msg.type === "ERROR" && msg.message) {
              setStatus(false, String(msg.message));
            }
          } catch (e) {}
        };

        ws.onclose = () => {
          setStatus(false, "Disconnected");
        };

        ws.onerror = () => {
          setStatus(false, "Connection error");
        };
      }

      connectBtn.onclick = connect;
      playBtn.onclick = () => send({ type: "TIMER_PLAY" });
      pauseBtn.onclick = () => send({ type: "TIMER_PAUSE" });
      resetBtn.onclick = () => send({ type: "TIMER_RESET" });
      prevBtn.onclick = () => send({ type: "AGENDA_PREV" });
      nextBtn.onclick = () => send({ type: "AGENDA_NEXT" });
      applyBtn.onclick = () => send({ type: "AGENDA_APPLY_SELECTED" });
      openDisplayBtn.onclick = () => {
        const raw = (outputIndexEl.value || "").trim();
        const n = raw === "" ? null : Number(raw);
        if (raw !== "" && !Number.isFinite(n)) return;
        send({ type: "OPEN_DISPLAY", payload: { outputIndex: raw === "" ? null : n } });
      };
      closeDisplayBtn.onclick = () => send({ type: "CLOSE_DISPLAY" });

      broadcastShowBtn.onclick = () =>
        send({ type: "BROADCAST_SET", payload: { message: (broadcastMsgEl.value || "").trim(), show: true } });
      broadcastHideBtn.onclick = () => send({ type: "BROADCAST_SET", payload: { show: false } });

      agendaJsonApplyBtn.onclick = () => {
        agendaJsonStatusEl.textContent = "";
        try {
          const parsed = JSON.parse(agendaJsonEl.value || "null");
          if (!Array.isArray(parsed)) throw new Error("Expected a JSON array");
          send({ type: "AGENDA_SET", payload: { agenda: parsed } });
          agendaJsonStatusEl.textContent = "Sent to host.";
        } catch (err) {
          agendaJsonStatusEl.textContent = err && err.message ? String(err.message) : "Invalid JSON";
        }
      };

      draftAddBtn.onclick = () => {
        setDraftStatus("");
        const label = String(draftLabelEl.value || "").trim();
        const minutes = Number(String(draftMinutesEl.value || "").trim() || "0");
        const color = String(draftColorEl.value || "#10b981");
        const description = String(draftDescriptionEl.value || "").trim();

        if (!label) {
          setDraftStatus("Please enter a title.");
          return;
        }
        if (!Number.isFinite(minutes) || minutes <= 0) {
          setDraftStatus("Minutes must be a number > 0.");
          return;
        }

        const nextItem = normalizeAgendaItem({
          id: `${Date.now()}-${Math.random()}`,
          label,
          duration: Math.round(minutes * 60),
          color,
          description,
        });
        draftAgenda = draftAgenda.concat([nextItem]);
        renderDraft();

        draftLabelEl.value = "";
        draftMinutesEl.value = "5";
        draftDescriptionEl.value = "";
        setDraftStatus("Added.");
      };

      draftClearBtn.onclick = () => {
        draftAgenda = [];
        renderDraft();
        setDraftStatus("Cleared.");
      };

      draftLoadFromHostBtn.onclick = () => {
        draftAgenda = (latestHostAgenda || []).map(normalizeAgendaItem);
        renderDraft();
        setDraftStatus(draftAgenda.length ? "Loaded host agenda." : "Host agenda is empty.");
      };

      draftSendBtn.onclick = () => {
        setDraftStatus("");
        if (!draftAgenda.length) {
          setDraftStatus("Draft agenda is empty.");
          return;
        }
        send({ type: "AGENDA_SET", payload: { agenda: draftAgenda } });
        setDraftStatus("Sent to host.");
      };

      // Defaults
      draftMinutesEl.value = "5";
      renderDraft();
    </script>
  </body>
</html>
